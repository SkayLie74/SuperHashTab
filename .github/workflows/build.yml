name: SuperHashTab CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.1

    - name: Compile SuperHashTab Shell Extension
      run: |
        C:\Windows\Microsoft.NET\Framework64\v4.0.30319\csc.exe /target:library /out:SuperHashTab.dll /optimize /r:System.Windows.Forms.dll,System.Drawing.dll,System.dll,System.Core.dll src\SuperHashTabShellExt.cs

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v3
      with:
        name: SuperHashTab-DLL
        path: SuperHashTab.dll
